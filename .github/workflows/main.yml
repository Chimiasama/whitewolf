name: Build Android Debug APK (Manual)

on:
  workflow_dispatch: # Executa APENAS quando você comandar manualmente pelo site

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Corrigido para a versão exigida pelo Capacitor 8
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App & Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Corrigido de 17 para 21 para resolver o erro de compilação

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
