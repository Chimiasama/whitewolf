name: Android CI (Automatic & Manual APK Build)

on:
  push:
    branches:
      - main       # Mude para 'master' se a sua branch principal tiver esse nome
      - master     # Deixei ambas para garantir que vai disparar independentemente do nome da sua branch
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Mantém o botão de executar manualmente pelo site caso você precise

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2

    # 1. Configura o Node.js (Essencial para o React/Vite do whitewolf)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22 # Versão exigida pelo Capacitor 8
        cache: 'npm'

    # 2. Instala as dependências da parte Web
    - name: Install Dependencies
      run: npm ci

    # 3. Compila o React e joga os arquivos para a pasta do Android via Capacitor
    - name: Build Web App & Sync Capacitor
      run: |
        npm run build
        npx cap sync android

    # 4. Configura o Java 21 (Igual ao seu outro script, ótimo para o projeto)
    - name: Set up JDK 21
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # 5. Garante o SDK Android correto (Atualizado para v4 para evitar erros de Node deprecado)
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: 11076708

    # 6. Compila o arquivo APK de teste de fato
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    # 7. Disponibiliza o APK para você baixar no final do processo
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: App-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
