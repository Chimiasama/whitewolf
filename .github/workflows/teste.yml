name: Android CI

on:
  push:
    branches:
      - master
      - copilot-git-*
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ------------------------------------------------------------
    # JDK 21 (necessário para teu projeto atual)
    # ------------------------------------------------------------
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        cache: gradle

    # ------------------------------------------------------------
    # Garante SDK Android correto (evita quebra futura)
    # ------------------------------------------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708

    # ------------------------------------------------------------
    # Permissões
    # ------------------------------------------------------------
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Grant execute permission for scripts
      run: chmod +x ./scripts/*.sh

    # ------------------------------------------------------------
    # FAIL FAST – se isso quebrar, o resto nem roda
    # ------------------------------------------------------------
    - name: Run reliability gate (Fase 6)
      run: ./scripts/phase6_reliability_gate.sh

    # ------------------------------------------------------------
    # TESTES UNITÁRIOS (não depende de build completo)
    # ------------------------------------------------------------
    - name: Run unit tests
      run: ./gradlew test --stacktrace

    # ------------------------------------------------------------
    # COMPILA DEBUG (verifica se o app ainda compila)
    # ------------------------------------------------------------
    - name: Build Lite Debug
      run: ./gradlew assembleLiteDebug --stacktrace

    # ------------------------------------------------------------
    # COMPILA RELEASE (detecta erro de Proguard/R8/minify)
    # ------------------------------------------------------------
    - name: Build Full Release
      run: ./gradlew assembleFullRelease --stacktrace
